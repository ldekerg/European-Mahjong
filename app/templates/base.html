<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMA Ranking</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <script>
      (function() {
        if (localStorage.getItem('theme') === 'dark')
          document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
</head>
<body>
    <nav>
        <a href="/accueil">EMA Ranking</a>
        <a href="/classement">Classement</a>
        <a href="/joueurs/">Joueurs</a>
        <a href="/pays/">Pays</a>
        <a href="/tournois/">Tournois</a>
        <a href="/hallfame/">Hall of Fame</a>
        <button class="regles-toggle" onclick="toggleRegles()" title="Règle par défaut">MCR</button>
        <button class="theme-toggle" onclick="toggleTheme()" title="Dark mode">🌙</button>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
    // ── Thème ────────────────────────────────────────────────────────────────
    function toggleTheme() {
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
        localStorage.setItem('theme', dark ? 'light' : 'dark');
        document.querySelector('.theme-toggle').textContent = dark ? '🌙' : '☀️';
        _refreshAllCharts();
    }
    if (localStorage.getItem('theme') === 'dark')
        document.querySelector('.theme-toggle').textContent = '☀️';

    // ── Règle par défaut (MCR/RCR) ───────────────────────────────────────────
    function _getRegles() {
        return localStorage.getItem('regles') || 'MCR';
    }

    function toggleRegles() {
        var r = _getRegles() === 'MCR' ? 'RCR' : 'MCR';
        localStorage.setItem('regles', r);
        _applyReglesPref();
    }

    function _applyReglesPref() {
        var r = _getRegles();
        var btn = document.querySelector('.regles-toggle');
        if (btn) btn.textContent = r;

        // Réordonner et activer les onglets MCR/RCR sur la page
        document.querySelectorAll('.tabs').forEach(function(tabs) {
            var btns = Array.from(tabs.querySelectorAll('.tab-btn'));
            if (btns.length < 2) return;

            // Détecter les boutons MCR et RCR
            var mcrBtn = null, rcrBtn = null;
            btns.forEach(function(b) {
                var text = b.textContent.trim().toUpperCase();
                if (text.startsWith('MCR') || b.querySelector('.badge-mcr')) mcrBtn = b;
                if (text.startsWith('RCR') || b.querySelector('.badge-rcr')) rcrBtn = b;
            });
            if (!mcrBtn || !rcrBtn) return;

            // Réordonner : la règle préférée en premier
            var preferred = r === 'RCR' ? rcrBtn : mcrBtn;
            var other     = r === 'RCR' ? mcrBtn : rcrBtn;
            if (tabs.firstElementChild !== preferred) {
                tabs.insertBefore(preferred, tabs.firstElementChild);
                tabs.insertBefore(other, preferred.nextSibling);
            }

            // Ne pas forcer si l'URL contient un paramètre regles explicite (navigation intentionnelle)
            var urlRegles = new URLSearchParams(window.location.search).get('regles');
            if (urlRegles) return;

            // Activer la règle préférée si aucun onglet n'est actif via URL/serveur
            var anyActive = btns.some(function(b) { return b.classList.contains('active'); });
            var wrongActive = other.classList.contains('active') && !preferred.classList.contains('active');
            if (!anyActive || wrongActive) {
                preferred.click();
            }
        });
    }

    document.addEventListener('DOMContentLoaded', _applyReglesPref);

    // ── Charts ───────────────────────────────────────────────────────────────
    function _refreshAllCharts() {
        var style = getComputedStyle(document.documentElement);
        function cv(name) { return style.getPropertyValue(name).trim(); }

        function refreshChartJS(chart) {
            if (!chart) return;
            var textColor = cv('--text2')      || '#666';
            var gridColor = cv('--chart-grid') || 'rgba(0,0,0,0.07)';
            ['x','yPos','yScore','y'].forEach(function(axisId) {
                var ax = chart.options.scales[axisId];
                if (!ax) return;
                if (ax.ticks)  ax.ticks.color  = textColor;
                if (ax.grid)   ax.grid.color   = gridColor;
                if (ax.title)  ax.title.color  = textColor;
            });
            if (chart.options.plugins && chart.options.plugins.legend)
                chart.options.plugins.legend.labels.color = textColor;
            chart.data.datasets.forEach(function(ds) {
                if (ds._cssColor) ds.borderColor = cv(ds._cssColor);
            });
            chart.update('none');
        }

        var reg = window._JOUEURS_CHARTS;
        if (reg) Object.keys(reg).forEach(function(id) { refreshChartJS(reg[id]); });
        var charts = window.CHARTS;
        if (charts) Object.keys(charts).forEach(function(id) { refreshChartJS(charts[id]); });
    }

    // ── Offsets sticky ───────────────────────────────────────────────────────
    function updateStickyOffsets() {
        var root = document.documentElement;
        var off = 0;

        var nav = document.querySelector('nav');
        if (nav) off += nav.offsetHeight;
        root.style.setProperty('--sticky-header-top', off + 'px');

        document.querySelectorAll('.ranking-header, .player-header').forEach(function(el) {
            if (!el.closest('.tab-content')) off += el.offsetHeight;
        });
        root.style.setProperty('--sticky-tabs-top', off + 'px');

        document.querySelectorAll('.tabs').forEach(function(el) {
            if (!el.closest('.tab-content')) off += el.offsetHeight;
        });
        root.style.setProperty('--sticky-inner-top', off + 'px');

        document.querySelectorAll('.tab-content .ranking-header').forEach(function(el) {
            if (!el.closest('.tab-content .tab-content')) off += el.offsetHeight;
        });
        root.style.setProperty('--sticky-inner2-top', off + 'px');
    }

    document.addEventListener('DOMContentLoaded', updateStickyOffsets);
    window.addEventListener('resize', updateStickyOffsets);
    </script>
</body>
</html>
