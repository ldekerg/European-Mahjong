<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🀄 EMA Ranking — Verification</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
  (function () {
    const t = localStorage.getItem('theme');
    if (t) document.documentElement.setAttribute('data-theme', t);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
      document.documentElement.setAttribute('data-theme', 'dark');
  })();
  </script>
  <style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .verify-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 2.5rem 2rem; max-width: 380px; width: 100%;
    box-shadow: 0 4px 24px var(--shadow); text-align: center;
  }
  .verify-logo { font-size: 3rem; margin-bottom: 0.5rem; }
  .verify-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
  .verify-sub { color: var(--text2); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .cf-widget { display: flex; justify-content: center; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="verify-card">
    <div class="verify-logo">🀄</div>
    <div class="verify-title">EMA Ranking</div>
    <p class="verify-sub">Please confirm you are human to continue.</p>
    <form method="post" action="/verify" id="verify-form">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="cf-widget">
        <div class="cf-turnstile"
             data-sitekey="0x4AAAAAADTS40x5MH4A2hEc"
             data-callback="onVerified"
             data-theme="auto">
        </div>
      </div>
      <noscript>
        <p style="color:var(--text2);font-size:0.85rem">JavaScript is required to verify.</p>
      </noscript>
    </form>
  </div>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() { twemoji.parse(document.body, { folder: 'svg', ext: '.svg' }); });
  function onVerified(token) {
    document.getElementById('verify-form').submit();
  }
  </script>
</body>
</html>
