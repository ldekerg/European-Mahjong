{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <h1>{{ trad('nav.quotas') }}</h1>
  <p class="dim" style="font-size:0.9rem;margin-top:0.25rem">{{ trad('quotas.subtitle') }}</p>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('mcr', this)"><span class="badge badge-mcr">MCR</span></button>
  <button class="tab-btn" onclick="showTab('rcr', this)"><span class="badge badge-rcr">RCR</span></button>
</div>

{# ===== MCR ===== #}
<div id="tab-mcr" class="tab-content">
  {% set tab = mcr %}
  {% include "partials/quotas_tab.html" %}
</div>

{# ===== RCR ===== #}
<div id="tab-rcr" class="tab-content" style="display:none">
  {% set tab = rcr %}
  {% include "partials/quotas_tab.html" %}
</div>

<script>
function showTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = '';
  btn.classList.add('active');
}
</script>
{% endblock %}
